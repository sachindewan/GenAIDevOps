name: Release Report

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: read

jobs:
  collect-pr-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build release-report.json
        id: build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list \
            --repo ${{ github.repository }} \
            --state merged \
            --base main \
            --limit 1 \
            --json number,title,author,labels,body \
            --jq '.[0] | {
              pr_number: .number,
              title:     .title,
              author:    .author.login,
              labels:    [.labels[].name],
              body:      .body
            }')

          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "No merged PR — building report from commit metadata."
            jq -n \
              --arg sha "${{ github.sha }}" \
              --arg msg "${{ github.event.head_commit.message }}" \
              --arg author "${{ github.event.head_commit.author.name }}" \
              '{
                pr_number: null,
                title:     $msg,
                author:    $author,
                labels:    [],
                body:      ("Direct push: " + $sha)
              }' > release-report.json
          else
            echo "$PR" > release-report.json
          fi

          cat release-report.json
          echo "has_pr=true" >> $GITHUB_OUTPUT

      - name: Upload release report
        uses: actions/upload-artifact@v4
        with:
          name: release-report
          path: release-report.json


  generate-release-notes:
    runs-on: ubuntu-latest
    needs: collect-pr-metadata
    steps:
      - name: Download release report
        uses: actions/download-artifact@v4
        with:
          name: release-report

      - name: Generate release-notes.md
        run: |
          cat > generate.jq << 'EOF'
          def section(heading; label):
            if (.labels | index(label)) != null then
              "## " + heading + "\n- " + .title + " (#" + (.pr_number | tostring) + ") \u2014 @" + .author + "\n"
            else empty
            end;

          section("Breaking Changes"; "release:major"),
          section("Features";         "release:minor"),
          section("Fixes";            "release:patch"),
          section("Infrastructure";   "area:infra"),
          if (.labels | map(select(. == "release:major" or . == "release:minor" or . == "release:patch" or . == "area:infra")) | length) == 0 then
            "## Other Changes\n- " + .title + " (#" + (.pr_number | tostring) + ") \u2014 @" + .author + "\n"
          else empty
          end
          EOF

          jq -r -f generate.jq release-report.json > release-notes.md

          echo "--- release-notes.md content ---"
          cat release-notes.md
          echo "--- end ---"

          if [ ! -s release-notes.md ]; then
            echo "Error: release-notes.md is empty"
            exit 1
          fi

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: release-${{ github.sha }}
          body_path: release-notes.md
          draft: true
