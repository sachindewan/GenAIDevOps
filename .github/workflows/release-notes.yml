name: Release Report

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: read

jobs:
  collect-pr-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build release-report.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh api \
            /repos/${{ github.repository }}/commits/${{ github.sha }}/pulls \
            --jq '.[0] | {
              pr_number: .number,
              title:     .title,
              author:    .user.login,
              labels:    [.labels[].name],
              body:      .body
            }')

          if [ -z "$PR" ]; then
            echo "No merged PR found for commit ${{ github.sha }}"
            exit 1
          fi

          echo "$PR" > release-report.json
          cat release-report.json

      - name: Upload release report
        uses: actions/upload-artifact@v4
        with:
          name: release-report
          path: release-report.json


  generate-release-notes:
    runs-on: ubuntu-latest
    needs: collect-pr-metadata
    steps:
      - name: Download release report
        uses: actions/download-artifact@v4
        with:
          name: release-report

      - name: Generate release-notes.md
        run: |
          jq -r '
            def section(heading; label):
              if (.labels | index(label)) != null then
                "## " + heading + "\n- " + .title + " (#" + (.pr_number | tostring) + ") — @" + .author + "\n"
              else empty
              end;

            section("Breaking Changes"; "release:major"),
            section("Features";         "release:minor"),
            section("Fixes";            "release:patch"),
            section("Infrastructure";   "area:infra")
          ' release-report.json > release-notes.md

          cat release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          draft: true
