name: Release Report

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: read

jobs:
  collect-pr-metadata:
    runs-on: ubuntu-latest
    outputs:
      has_pr: ${{ steps.build.outputs.has_pr }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build release-report.json
        id: build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh api \
            /repos/${{ github.repository }}/commits/${{ github.sha }}/pulls \
            --jq 'if length == 0 then null else .[0] | {
              pr_number: .number,
              title:     .title,
              author:    .user.login,
              labels:    [.labels[].name],
              body:      .body
            } end')

          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "No merged PR found for commit ${{ github.sha }} — skipping."
            echo "has_pr=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "$PR" > release-report.json
          cat release-report.json
          echo "has_pr=true" >> $GITHUB_OUTPUT

      - name: Upload release report
        if: steps.build.outputs.has_pr == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-report
          path: release-report.json


  generate-release-notes:
    runs-on: ubuntu-latest
    needs: collect-pr-metadata
    if: needs.collect-pr-metadata.outputs.has_pr == 'true'
    steps:
      - name: Download release report
        uses: actions/download-artifact@v4
        with:
          name: release-report

      - name: Generate release-notes.md
        run: |
          jq -r '
            def section(heading; label):
              if (.labels | index(label)) != null then
                "## " + heading + "\n- " + .title + " (#" + (.pr_number | tostring) + ") \u2014 @" + .author + "\n"
              else empty
              end;

            section("Breaking Changes"; "release:major"),
            section("Features";         "release:minor"),
            section("Fixes";            "release:patch"),
            section("Infrastructure";   "area:infra"),
            if (.labels | map(select(. == "release:major" or . == "release:minor" or . == "release:patch" or . == "area:infra")) | length) == 0 then
              "## Other Changes\n- " + .title + " (#" + (.pr_number | tostring) + ") \u2014 @" + .author + "\n"
            else empty
            end
          ' release-report.json > release-notes.md

          echo "--- release-notes.md content ---"
          cat release-notes.md
          echo "--- end ---"

          if [ ! -s release-notes.md ]; then
            echo "Error: release-notes.md is empty"
            exit 1
          fi

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: release-${{ github.sha }}
          body_path: release-notes.md
          draft: true
