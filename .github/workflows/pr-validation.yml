name: PR Validation

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true
  
permissions:
  contents: read
  pull-requests: write

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - run: dotnet restore src/GenAIDevOps.sln
      - run: dotnet build src/GenAIDevOps.sln --configuration Release --no-restore
      - name: Test with coverage
        run: |
          dotnet test src/GenAIDevOps.sln --configuration Release --no-build \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Threshold=70 \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ThresholdType=line \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ThresholdStat=total

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage

  formatting:
    name: Formatting Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - run: dotnet restore src/GenAIDevOps.sln
      - run: dotnet format src/GenAIDevOps.sln --verify-no-changes

  # dependency-review:
  #   name: Dependency Review
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/dependency-review-action@v4

  pr-summary:
    name: PR Summary Comment
    runs-on: ubuntu-latest
    needs: [build-test, formatting] #, dependency-review]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and post PR summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BUILD_RESULT: ${{ needs.build-test.result }}
          FORMAT_RESULT: ${{ needs.formatting.result }}
          #DEP_RESULT: ${{ needs.dependency-review.result }}
        run: |
          COMMITS=$(git log origin/main..HEAD --pretty=format:'- %s' | head -20)
          CHANGED=$(git diff --name-only origin/main...HEAD)

          INFRA_IMPACT=No
          RISK=Low

          if echo "$CHANGED" | grep -qiE '\.(bicep|tf|json|yml|yaml)$'; then
            INFRA_IMPACT=Yes
            RISK=High
          elif echo "$CHANGED" | grep -qiE '(migration|schema|database|auth|security)'; then
            RISK=Medium
          fi

          if echo "$CHANGED" | grep -qiE 'test'; then
            TEST_NOTE="Test files were modified - verify coverage is adequate."
          else
            TEST_NOTE="No test files changed - ensure new logic is covered."
          fi

          cat <<EOF > summary.md
          ## PR Summary

          **Title:** $PR_TITLE

          ### Changes
          $COMMITS

          ### Risk Assessment
          | Area | Status |
          |---|---|
          | Risk Level | $RISK |
          | Infra Impact | $INFRA_IMPACT |

          ### Testing Considerations
          $TEST_NOTE

          ### CI Results
          | Job | Result |
          |---|---|
          | Build & Test | $BUILD_RESULT |
          | Formatting | $FORMAT_RESULT |
          | Dependency Review | $DEP_RESULT |
          EOF

          gh pr comment "$PR_NUMBER" --body-file summary.md
