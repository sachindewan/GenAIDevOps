name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: src/**/*.csproj

      - name: Restore dependencies
        run: dotnet restore src/GenAIDevOps.sln

      - name: Build
        run: dotnet build src/GenAIDevOps.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/GenAIDevOps.sln --no-build --configuration Release --verbosity normal
